<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libretto — Gestione Entrate e Uscite</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16241F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Libretto">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #1D2E28;
    --ink-light: #2B4038;
    --paper: #F1E9D2;
    --paper-dim: #E7DCBE;
    --bg: #16241F;
    --bg-deep: #101B17;
    --text-on-dark: #F1EDE2;
    --text-dim: #9FB0A6;
    --gold: #C89B3C;
    --gold-dim: #8f6f2b;
    --teal: #4FA88B;
    --rust: #C1502E;
    --line: rgba(241,233,210,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(200,155,60,0.07), transparent 45%),
      radial-gradient(circle at 100% 100%, rgba(79,168,139,0.06), transparent 40%);
    color: var(--text-on-dark);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 40px 20px 80px;
  }
  .wrap{ max-width: 1080px; margin: 0 auto; }

  /* Masthead */
  .masthead{
    text-align:center;
    padding-bottom: 28px;
    margin-bottom: 34px;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 10px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(32px, 5vw, 48px);
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .masthead p{
    color: var(--text-dim);
    margin:0;
    font-size: 14.5px;
  }

  /* Summary cards */
  .summary{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 36px;
  }
  .stamp{
    background: var(--paper);
    color: var(--ink);
    border-radius: 4px;
    padding: 20px 22px;
    position: relative;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .stamp::before{
    content: attr(data-n);
    position:absolute;
    top: 14px;
    right: 16px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    opacity: 0.35;
  }
  .stamp-label{
    font-family:'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 11px;
    opacity: 0.65;
    margin-bottom: 10px;
  }
  .stamp-value{
    font-family:'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
  }
  .stamp.entrate .stamp-value{ color: var(--teal); }
  .stamp.uscite .stamp-value{ color: var(--rust); }
  .stamp.saldo .stamp-value{ color: var(--ink); }
  .stamp.saldo.negativo .stamp-value{ color: var(--rust); }

  /* Layout */
  .goal-panel{ margin-bottom: 24px; }
  .goal-form{
    display:flex;
    gap: 12px;
    align-items:flex-end;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .goal-form > div{ flex: 1; min-width: 200px; }
  .goal-form .btn{ width: auto; padding: 10px 18px; flex-shrink:0; }
  #goal-year{ color: var(--gold); }

  .goal-empty{
    color: var(--text-dim);
    font-size: 13.5px;
  }
  .goal-progress-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .goal-progress-top .amounts{
    font-family:'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 600;
  }
  .goal-progress-top .amounts .of{
    color: var(--text-dim);
    font-weight: 400;
    font-size: 13px;
  }
  .goal-progress-top .pct{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--gold);
  }
  .goal-track{
    height: 10px;
    background: var(--ink-light);
    border-radius: 6px;
    overflow:hidden;
    margin-bottom: 18px;
  }
  .goal-fill{
    height:100%;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--teal), var(--gold));
    transition: width 0.3s;
  }
  .goal-fill.behind{ background: linear-gradient(90deg, var(--rust), var(--gold)); }
  .goal-stats{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .goal-stat{
    background: var(--ink-light);
    border-radius: 4px;
    padding: 12px 14px;
  }
  .goal-stat-label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .goal-stat-value{
    font-family:'IBM Plex Mono', monospace;
    font-size: 17px;
    font-weight: 600;
  }
  .goal-remove{
    background:none;
    border:none;
    color: var(--text-dim);
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    text-decoration: underline;
    cursor:pointer;
    margin-top: 14px;
  }
  .goal-remove:hover{ color: var(--rust); }
  .grid{
    display:grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 24px;
    align-items:start;
  }
  @media (max-width: 860px){ .grid{ grid-template-columns: 1fr; } }

  .panel{
    background: var(--bg-deep);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 24px;
  }
  .panel h2{
    font-family:'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 18px;
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .panel h2::before{
    content:'';
    width: 14px; height: 1px;
    background: var(--gold);
    display:inline-block;
  }

  /* Form */
  form.entry{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 22px;
  }
  form.entry .full{ grid-column: 1 / -1; }
  .toggle{
    display:flex;
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow:hidden;
  }
  .toggle button{
    flex:1;
    padding: 9px 0;
    background: transparent;
    border:none;
    color: var(--text-dim);
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor:pointer;
  }
  .toggle button.active.entrata{ background: rgba(79,168,139,0.18); color: var(--teal); }
  .toggle button.active.uscita{ background: rgba(193,80,46,0.18); color: var(--rust); }

  label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  input, select{
    width:100%;
    background: var(--ink-light);
    border: 1px solid var(--line);
    color: var(--text-on-dark);
    padding: 10px 11px;
    border-radius: 4px;
    font-family:'Inter', sans-serif;
    font-size: 14px;
  }
  input:focus, select:focus{
    outline: 2px solid var(--gold);
    outline-offset: 1px;
  }
  input[type="number"]{ font-family:'IBM Plex Mono', monospace; }

  .btn{
    grid-column: 1 / -1;
    background: var(--gold);
    color: var(--bg-deep);
    border:none;
    padding: 12px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 14px;
    cursor:pointer;
    font-family:'Inter', sans-serif;
    transition: background 0.15s;
  }
  .btn:hover{ background: #dbae4c; }

  /* Filter row */
  .filter-row{
    display:flex;
    gap: 12px;
    margin-bottom: 4px;
  }
  .filter-row > div{ flex:1; }

  /* Ledger list */
  .ledger{ border-top: 1px solid var(--line); }
  .row{
    display:grid;
    grid-template-columns: 26px 1fr auto 30px;
    align-items:center;
    gap: 12px;
    padding: 11px 2px;
    border-bottom: 1px dashed var(--line);
  }
  .row .num{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .row .desc{ min-width:0; }
  .row .cat{
    font-size: 13px;
    font-weight: 500;
  }
  .row .meta{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .row .amount{
    font-family:'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    white-space:nowrap;
  }
  .row .amount.pos{ color: var(--teal); }
  .row .amount.neg{ color: var(--rust); }
  .row .del{
    background:none;
    border:none;
    color: var(--text-dim);
    cursor:pointer;
    font-size: 16px;
    line-height:1;
  }
  .row .del:hover{ color: var(--rust); }
  .empty{
    padding: 24px 4px;
    color: var(--text-dim);
    font-size: 13.5px;
    text-align:center;
  }

  /* Category bars */
  .catbar{ margin-bottom: 14px; }
  .catbar-top{
    display:flex;
    justify-content:space-between;
    font-size: 13px;
    margin-bottom: 6px;
  }
  .catbar-top .pct{
    font-family:'IBM Plex Mono', monospace;
    color: var(--text-dim);
  }
  .catbar-track{
    height: 7px;
    background: var(--ink-light);
    border-radius: 4px;
    overflow:hidden;
  }
  .catbar-fill{
    height:100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 4px;
  }

  /* Advice */
  .advice{
    display:flex;
    flex-direction:column;
    gap: 12px;
    margin-top: 22px;
  }
  .tip{
    border-left: 2px solid var(--gold);
    padding: 10px 14px;
    background: rgba(200,155,60,0.06);
    border-radius: 0 4px 4px 0;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--text-on-dark);
  }
  .tip.warn{ border-left-color: var(--rust); background: rgba(193,80,46,0.08); }
  .tip.good{ border-left-color: var(--teal); background: rgba(79,168,139,0.08); }
  .tip b{ color: var(--gold); }
  .tip.warn b{ color: var(--rust); }
  .tip.good b{ color: var(--teal); }

  .divider{
    border:none;
    border-top: 1px solid var(--line);
    margin: 22px 0;
  }

  .footer-actions{
    text-align:center;
    margin-top: 30px;
    display:flex;
    justify-content:center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .footer-actions button{
    background:none;
    border: 1px solid var(--line);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 4px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    cursor:pointer;
  }
  .footer-actions button:hover{ color: var(--gold); border-color: var(--gold); }
  .footer-actions button#reset-btn:hover{ color: var(--rust); border-color: var(--rust); }

  .status{
    text-align:center;
    color: var(--text-dim);
    font-size: 12px;
    font-family:'IBM Plex Mono', monospace;
    margin-bottom: 18px;
    min-height: 16px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div class="eyebrow">Libretto Personale</div>
    <h1>Entrate &amp; Uscite</h1>
    <p>Registra i movimenti, controlla il saldo, leggi i consigli per risparmiare.</p>
  </div>

  <div id="status" class="status">Caricamento dati…</div>

  <div class="summary">
    <div class="stamp entrate" data-n="01">
      <div class="stamp-label">Entrate totali</div>
      <div class="stamp-value" id="tot-entrate">€ 0,00</div>
    </div>
    <div class="stamp uscite" data-n="02">
      <div class="stamp-label">Uscite totali</div>
      <div class="stamp-value" id="tot-uscite">€ 0,00</div>
    </div>
    <div class="stamp saldo" data-n="03" id="saldo-card">
      <div class="stamp-label">Saldo</div>
      <div class="stamp-value" id="tot-saldo">€ 0,00</div>
    </div>
  </div>

  <div class="panel goal-panel">
    <h2>Obiettivo di risparmio annuale</h2>
    <div class="goal-form">
      <div>
        <label for="obiettivo-input">Quanto vuoi risparmiare entro dicembre <span id="goal-year"></span>?</label>
        <input type="text" inputmode="decimal" id="obiettivo-input" placeholder="es. 3000">
      </div>
      <button type="button" class="btn" id="obiettivo-salva">Imposta obiettivo</button>
    </div>
    <div id="goal-output"></div>
  </div>

  <div class="grid">
    <!-- LEFT: form + ledger -->
    <div class="panel">
      <h2>Nuovo movimento</h2>
      <form class="entry" id="form">
        <div class="full toggle" id="tipo-toggle">
          <button type="button" class="active entrata" data-tipo="entrata">Entrata</button>
          <button type="button" class="uscita" data-tipo="uscita">Uscita</button>
        </div>

        <div>
          <label for="categoria">Categoria</label>
          <select id="categoria"></select>
        </div>
        <div>
          <label for="importo">Importo (€)</label>
          <input type="text" inputmode="decimal" id="importo" placeholder="0,00" required>
        </div>

        <div>
          <label for="data">Data</label>
          <input type="date" id="data" required>
        </div>
        <div>
          <label for="nota">Nota (opzionale)</label>
          <input type="text" id="nota" placeholder="es. spesa al supermercato">
        </div>

        <button type="submit" class="btn">Aggiungi movimento</button>
      </form>

      <div class="filter-row">
        <div>
          <label for="filtro-mese">Mese</label>
          <select id="filtro-mese">
            <option value="tutti">Tutti i mesi</option>
            <option value="0">Gennaio</option>
            <option value="1">Febbraio</option>
            <option value="2">Marzo</option>
            <option value="3">Aprile</option>
            <option value="4">Maggio</option>
            <option value="5">Giugno</option>
            <option value="6">Luglio</option>
            <option value="7">Agosto</option>
            <option value="8">Settembre</option>
            <option value="9">Ottobre</option>
            <option value="10">Novembre</option>
            <option value="11">Dicembre</option>
          </select>
        </div>
        <div>
          <label for="filtro-anno">Anno</label>
          <select id="filtro-anno">
            <option value="tutti">Tutti gli anni</option>
          </select>
        </div>
      </div>

      <div class="ledger" id="ledger"></div>
    </div>

    <!-- RIGHT: report -->
    <div class="panel">
      <h2>Report per categoria</h2>
      <div id="catbars"></div>

      <hr class="divider">

      <h2>Consigli per risparmiare</h2>
      <div class="advice" id="advice"></div>
    </div>
  </div>

  <div class="footer-actions">
    <button id="export-btn">Esporta backup (.json)</button>
    <button id="import-btn">Importa backup</button>
    <button id="reset-btn">Cancella tutti i dati</button>
    <input type="file" id="import-file" accept="application/json" style="display:none">
  </div>

</div>

<script>
(function(){
  const CATEGORIE = {
    entrata: ['Stipendio', 'Freelance / lavoro extra', 'Regalo', 'Rimborso', 'Altro'],
    uscita: ['Casa / Affitto', 'Bollette', 'Spesa alimentare', 'Trasporti', 'Svago', 'Salute', 'Abbonamenti', 'Shopping', 'Altro']
  };
  const STORAGE_KEY = 'libretto:transazioni';
  const GOAL_KEY = 'libretto:obiettivo';

  let obiettivoAnnuale = null;
  let filtro = { mese: 'tutti', anno: 'tutti' };

  let tipoCorrente = 'entrata';
  let transazioni = [];

  const el = id => document.getElementById(id);
  const fmt = n => '€ ' + n.toLocaleString('it-IT', {minimumFractionDigits:2, maximumFractionDigits:2});

  function popolaCategorie(){
    const sel = el('categoria');
    sel.innerHTML = '';
    CATEGORIE[tipoCorrente].forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      sel.appendChild(opt);
    });
  }

  el('tipo-toggle').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if(!btn) return;
    tipoCorrente = btn.dataset.tipo;
    document.querySelectorAll('#tipo-toggle button').forEach(b => b.classList.toggle('active', b===btn));
    popolaCategorie();
  });

  function salva(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(transazioni));
      el('status').textContent = 'Dati salvati sul dispositivo';
    }catch(err){
      console.error(err);
      el('status').textContent = 'Errore nel salvataggio: memoria del browser piena o non disponibile';
    }
    setTimeout(()=>{ if(el('status').textContent.indexOf('Errore')===-1) el('status').textContent=''; }, 1800);
  }

  function carica(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      transazioni = raw ? JSON.parse(raw) : [];
    }catch(err){
      console.error(err);
      transazioni = [];
    }
    el('status').textContent = '';
    render();
  }

  function esportaBackup(){
    const blob = new Blob([JSON.stringify(transazioni, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const oggi = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `libretto-backup-${oggi}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    el('status').textContent = 'Backup esportato';
    setTimeout(()=>{ el('status').textContent=''; }, 1800);
  }

  function importaBackup(file){
    const reader = new FileReader();
    reader.onload = (e) => {
      try{
        const dati = JSON.parse(e.target.result);
        if(!Array.isArray(dati)) throw new Error('Formato non valido');
        const valide = dati.filter(t => t && typeof t.importo === 'number' && (t.tipo==='entrata'||t.tipo==='uscita') && t.categoria && t.data);
        if(valide.length === 0) throw new Error('Nessun movimento valido trovato nel file');

        const sostituisci = transazioni.length === 0 || confirm(
          `Trovati ${valide.length} movimenti nel backup.\n\nPremi OK per SOSTITUIRE i dati attuali, oppure Annulla per AGGIUNGERLI a quelli esistenti.`
        );

        if(sostituisci){
          transazioni = valide;
        } else {
          const idEsistenti = new Set(transazioni.map(t=>t.id));
          valide.forEach(t => { if(!idEsistenti.has(t.id)) transazioni.push(t); });
        }
        transazioni.sort((a,b)=> b.data.localeCompare(a.data));
        salva();
        render();
        el('status').textContent = 'Backup importato correttamente';
        setTimeout(()=>{ el('status').textContent=''; }, 1800);
      }catch(err){
        console.error(err);
        alert('Il file selezionato non è un backup valido: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  function caricaObiettivo(){
    try{
      const raw = localStorage.getItem(GOAL_KEY);
      obiettivoAnnuale = raw ? parseFloat(raw) : null;
    }catch(err){
      obiettivoAnnuale = null;
    }
  }

  function salvaObiettivo(valore){
    try{
      localStorage.setItem(GOAL_KEY, String(valore));
    }catch(err){
      console.error(err);
    }
  }

  function renderObiettivo(){
    el('goal-year').textContent = new Date().getFullYear();
    const out = el('goal-output');

    if(!obiettivoAnnuale || obiettivoAnnuale <= 0){
      out.innerHTML = '<div class="goal-empty">Imposta un obiettivo per vedere quanto risparmiare ogni mese per raggiungerlo.</div>';
      return;
    }

    const oggi = new Date();
    const annoCorrente = oggi.getFullYear();
    const meseCorrente = oggi.getMonth() + 1; // 1-12
    const mesiRimanenti = 13 - meseCorrente;   // include il mese in corso

    const movAnno = transazioni.filter(t => new Date(t.data).getFullYear() === annoCorrente);
    const entrateAnno = movAnno.filter(t=>t.tipo==='entrata').reduce((s,t)=>s+t.importo,0);
    const usciteAnno = movAnno.filter(t=>t.tipo==='uscita').reduce((s,t)=>s+t.importo,0);
    const risparmiatoFinora = entrateAnno - usciteAnno;

    const restante = obiettivoAnnuale - risparmiatoFinora;
    const pctRaggiunto = Math.max(0, Math.min(100, (risparmiatoFinora / obiettivoAnnuale) * 100));

    let html = '';
    html += `<div class="goal-progress-top">
      <div class="amounts">${fmt(Math.max(0,risparmiatoFinora))} <span class="of">di ${fmt(obiettivoAnnuale)}</span></div>
      <div class="pct">${pctRaggiunto.toFixed(0)}%</div>
    </div>`;
    html += `<div class="goal-track"><div class="goal-fill ${restante > 0 ? '' : ''}" style="width:${pctRaggiunto}%"></div></div>`;

    if(restante <= 0){
      html += `<div class="tip good">Obiettivo già raggiunto! Hai risparmiato <b>${fmt(risparmiatoFinora)}</b> nel ${annoCorrente}, superando il traguardo di ${fmt(obiettivoAnnuale)}.</div>`;
    } else {
      const risparmioMensileNecessario = restante / mesiRimanenti;
      const mediaRisparmioAttuale = meseCorrente > 0 ? risparmiatoFinora / meseCorrente : 0;
      const entrateMedieMensili = meseCorrente > 0 ? entrateAnno / meseCorrente : 0;
      const pctEntrateNecessaria = entrateMedieMensili > 0 ? (risparmioMensileNecessario / entrateMedieMensili * 100) : null;
      const inLinea = mediaRisparmioAttuale >= risparmioMensileNecessario;

      html += `<div class="goal-stats">
        <div class="goal-stat">
          <div class="goal-stat-label">Da risparmiare al mese</div>
          <div class="goal-stat-value">${fmt(risparmioMensileNecessario)}</div>
        </div>
        <div class="goal-stat">
          <div class="goal-stat-label">In % delle entrate</div>
          <div class="goal-stat-value">${pctEntrateNecessaria !== null ? pctEntrateNecessaria.toFixed(0)+'%' : '—'}</div>
        </div>
        <div class="goal-stat">
          <div class="goal-stat-label">Media risparmiata finora</div>
          <div class="goal-stat-value">${fmt(mediaRisparmioAttuale)}/mese</div>
        </div>
        <div class="goal-stat">
          <div class="goal-stat-label">Mesi rimanenti</div>
          <div class="goal-stat-value">${mesiRimanenti}</div>
        </div>
      </div>`;

      if(movAnno.length === 0){
        html += `<div class="tip" style="margin-top:14px;">Non hai ancora movimenti registrati nel ${annoCorrente}: la stima si baserà sui dati non appena inizi a registrarli.</div>`;
      } else if(inLinea){
        html += `<div class="tip good" style="margin-top:14px;">Stai risparmiando in media <b>${fmt(mediaRisparmioAttuale)}/mese</b>, un ritmo sufficiente per raggiungere l'obiettivo. Continua così.</div>`;
      } else {
        const differenza = risparmioMensileNecessario - mediaRisparmioAttuale;
        html += `<div class="tip warn" style="margin-top:14px;">Al ritmo attuale (<b>${fmt(mediaRisparmioAttuale)}/mese</b>) non raggiungerai l'obiettivo. Dovresti risparmiare <b>${fmt(differenza)} in più al mese</b> per i prossimi ${mesiRimanenti} mesi.</div>`;
      }
    }

    html += `<button type="button" class="goal-remove" id="goal-remove-btn">Rimuovi obiettivo</button>`;
    out.innerHTML = html;
    el('goal-remove-btn').addEventListener('click', () => {
      obiettivoAnnuale = null;
      localStorage.removeItem(GOAL_KEY);
      el('obiettivo-input').value = '';
      renderObiettivo();
    });
  }

  function aggiungi(t){
    transazioni.push(t);
    transazioni.sort((a,b)=> b.data.localeCompare(a.data));
    salva();
    render();
  }

  function elimina(id){
    transazioni = transazioni.filter(t => t.id !== id);
    salva();
    render();
  }

  el('form').addEventListener('submit', (e) => {
    e.preventDefault();
    const grezzo = el('importo').value.trim().replace(/\./g, '').replace(',', '.');
    const importo = parseFloat(grezzo);
    if(!importo || isNaN(importo) || importo <= 0){
      el('status').textContent = 'Inserisci un importo valido maggiore di zero';
      setTimeout(()=>{ el('status').textContent=''; }, 2200);
      el('importo').focus();
      return;
    }
    aggiungi({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      tipo: tipoCorrente,
      categoria: el('categoria').value,
      importo: importo,
      data: el('data').value || new Date().toISOString().slice(0,10),
      nota: el('nota').value.trim()
    });
    el('form').reset();
    el('importo').focus();
    popolaCategorie();
    el('data').valueAsDate = new Date();
  });

  el('reset-btn').addEventListener('click', () => {
    if(confirm('Vuoi davvero cancellare tutti i movimenti registrati? L\'operazione non è reversibile.')){
      transazioni = [];
      salva();
      render();
    }
  });

  el('export-btn').addEventListener('click', esportaBackup);

  el('import-btn').addEventListener('click', () => el('import-file').click());

  el('import-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(file) importaBackup(file);
    e.target.value = '';
  });

  el('obiettivo-salva').addEventListener('click', () => {
    const grezzo = el('obiettivo-input').value.trim().replace(/\./g, '').replace(',', '.');
    const valore = parseFloat(grezzo);
    if(!valore || isNaN(valore) || valore <= 0){
      el('status').textContent = 'Inserisci un obiettivo valido maggiore di zero';
      setTimeout(()=>{ el('status').textContent=''; }, 2200);
      return;
    }
    obiettivoAnnuale = valore;
    salvaObiettivo(valore);
    renderObiettivo();
  });

  function popolaAnni(){
    const sel = el('filtro-anno');
    const valoreAttuale = sel.value || 'tutti';
    const anni = new Set(transazioni.map(t => new Date(t.data).getFullYear()));
    anni.add(new Date().getFullYear());
    const anniOrdinati = Array.from(anni).sort((a,b)=>b-a);
    sel.innerHTML = '<option value="tutti">Tutti gli anni</option>' +
      anniOrdinati.map(a => `<option value="${a}">${a}</option>`).join('');
    sel.value = anniOrdinati.includes(parseInt(valoreAttuale)) ? valoreAttuale : 'tutti';
  }

  function transazioniFiltrate(){
    return transazioni.filter(t => {
      const d = new Date(t.data);
      if(filtro.anno !== 'tutti' && d.getFullYear() !== parseInt(filtro.anno)) return false;
      if(filtro.mese !== 'tutti' && d.getMonth() !== parseInt(filtro.mese)) return false;
      return true;
    });
  }

  function renderLedger(lista){
    const wrap = el('ledger');
    wrap.innerHTML = '';
    if(lista.length === 0){
      wrap.innerHTML = `<div class="empty">${transazioni.length === 0 ? 'Nessun movimento registrato. Aggiungi la prima voce qui sopra.' : 'Nessun movimento in questo periodo.'}</div>`;
      return;
    }
    lista.forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'row';
      const dataFmt = new Date(t.data).toLocaleDateString('it-IT', {day:'2-digit', month:'short', year:'numeric'});
      row.innerHTML = `
        <div class="num">${String(i+1).padStart(2,'0')}</div>
        <div class="desc">
          <div class="cat">${t.categoria}</div>
          <div class="meta">${dataFmt}${t.nota ? ' · ' + t.nota : ''}</div>
        </div>
        <div class="amount ${t.tipo==='entrata'?'pos':'neg'}">${t.tipo==='entrata'?'+':'−'} ${fmt(t.importo)}</div>
        <button class="del" title="Elimina" data-id="${t.id}">✕</button>
      `;
      wrap.appendChild(row);
    });
    wrap.querySelectorAll('.del').forEach(b => b.addEventListener('click', () => elimina(b.dataset.id)));
  }

  function renderSummary(lista){
    const entrate = lista.filter(t=>t.tipo==='entrata').reduce((s,t)=>s+t.importo,0);
    const uscite = lista.filter(t=>t.tipo==='uscita').reduce((s,t)=>s+t.importo,0);
    const saldo = entrate - uscite;
    el('tot-entrate').textContent = fmt(entrate);
    el('tot-uscite').textContent = fmt(uscite);
    el('tot-saldo').textContent = fmt(saldo);
    el('saldo-card').classList.toggle('negativo', saldo < 0);
    return {entrate, uscite, saldo};
  }

  function renderCategorie(lista){
    const wrap = el('catbars');
    wrap.innerHTML = '';
    const uscitaList = lista.filter(t=>t.tipo==='uscita');
    if(uscitaList.length === 0){
      wrap.innerHTML = `<div class="empty">${transazioni.length === 0 ? 'Nessuna uscita registrata: il report per categoria apparirà qui.' : 'Nessuna uscita in questo periodo.'}</div>`;
      return {};
    }
    const perCategoria = {};
    uscitaList.forEach(t => { perCategoria[t.categoria] = (perCategoria[t.categoria]||0) + t.importo; });
    const totale = Object.values(perCategoria).reduce((a,b)=>a+b,0);
    const ordinate = Object.entries(perCategoria).sort((a,b)=>b[1]-a[1]);
    ordinate.forEach(([cat, val]) => {
      const pct = totale ? (val/totale*100) : 0;
      const bar = document.createElement('div');
      bar.className = 'catbar';
      bar.innerHTML = `
        <div class="catbar-top"><span>${cat}</span><span class="pct">${fmt(val)} · ${pct.toFixed(0)}%</span></div>
        <div class="catbar-track"><div class="catbar-fill" style="width:${pct}%"></div></div>
      `;
      wrap.appendChild(bar);
    });
    return perCategoria;
  }

  function renderConsigli(lista, entrate, uscite, saldo, perCategoria){
    const wrap = el('advice');
    wrap.innerHTML = '';
    const tips = [];

    if(lista.length === 0){
      tips.push({cls:'', html: transazioni.length === 0 ? 'Aggiungi qualche movimento per ricevere consigli personalizzati sul tuo bilancio.' : 'Nessun movimento in questo periodo: allarga il filtro per vedere i consigli.'});
    } else {

      if(saldo < 0){
        tips.push({cls:'warn', html:`Stai spendendo più di quanto guadagni: il saldo è negativo di <b>${fmt(Math.abs(saldo))}</b>. Prova a individuare le voci di spesa più facili da ridurre nel breve periodo.`});
      } else if(entrate > 0){
        const tassoRisparmio = (saldo/entrate)*100;
        if(tassoRisparmio < 10){
          tips.push({cls:'warn', html:`Stai risparmiando solo il <b>${tassoRisparmio.toFixed(0)}%</b> delle tue entrate. Un obiettivo comune è puntare ad almeno il 20% (regola del 50/30/20: 50% bisogni, 30% desideri, 20% risparmio).`});
        } else if(tassoRisparmio < 20){
          tips.push({cls:'', html:`Il tuo tasso di risparmio è del <b>${tassoRisparmio.toFixed(0)}%</b>. Sei sulla buona strada: con qualche piccolo taglio potresti avvicinarti al 20% consigliato.`});
        } else {
          tips.push({cls:'good', html:`Ottimo lavoro: stai risparmiando il <b>${tassoRisparmio.toFixed(0)}%</b> delle tue entrate, in linea o sopra l'obiettivo consigliato del 20%.`});
        }
      }

      const catEntries = Object.entries(perCategoria).sort((a,b)=>b[1]-a[1]);
      if(catEntries.length > 0){
        const [topCat, topVal] = catEntries[0];
        const totUscite = Object.values(perCategoria).reduce((a,b)=>a+b,0);
        const pctTop = totUscite ? (topVal/totUscite*100) : 0;
        if(pctTop > 30){
          tips.push({cls:'warn', html:`La categoria <b>${topCat}</b> pesa da sola per il <b>${pctTop.toFixed(0)}%</b> delle tue uscite (${fmt(topVal)}). Vale la pena rivedere questa voce per primo.`});
        }
      }

      const abbonamenti = perCategoria['Abbonamenti'];
      if(abbonamenti){
        tips.push({cls:'', html:`Hai speso <b>${fmt(abbonamenti)}</b> in abbonamenti. Controlla se ci sono servizi che non usi più e che potresti disdire.`});
      }

      const svago = perCategoria['Svago'];
      if(svago && entrate > 0 && (svago/entrate*100) > 15){
        tips.push({cls:'', html:`Le spese per <b>Svago</b> superano il 15% delle entrate (${fmt(svago)}). Non è necessariamente un problema, ma è un buon punto da monitorare se vuoi aumentare il risparmio.`});
      }

      if(tips.length === 1 && saldo >= 0){
        tips.push({cls:'good', html:'La tua situazione finanziaria appare equilibrata. Continua a registrare i movimenti per consigli sempre più precisi nel tempo.'});
      }
    }

    tips.forEach(t => {
      const d = document.createElement('div');
      d.className = 'tip' + (t.cls ? ' '+t.cls : '');
      d.innerHTML = t.html;
      wrap.appendChild(d);
    });
  }

  function render(){
    popolaAnni();
    el('filtro-mese').value = filtro.mese;
    el('filtro-anno').value = filtro.anno;

    const lista = transazioniFiltrate();
    renderLedger(lista);
    const {entrate, uscite, saldo} = renderSummary(lista);
    const perCategoria = renderCategorie(lista);
    renderConsigli(lista, entrate, uscite, saldo, perCategoria);
    renderObiettivo();
  }

  el('filtro-mese').addEventListener('change', (e) => {
    filtro.mese = e.target.value;
    render();
  });
  el('filtro-anno').addEventListener('change', (e) => {
    filtro.anno = e.target.value;
    render();
  });

  // init
  popolaCategorie();
  el('data').valueAsDate = new Date();
  caricaObiettivo();
  if(obiettivoAnnuale) el('obiettivo-input').value = String(obiettivoAnnuale).replace('.', ',');
  carica();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW non registrato:', err));
  });
}
</script>
</body>
</html>
